<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script>
    (function () {
      try {
        var t = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', t === 'dark' ? 'dark' : 'light');
      } catch (e) {
        document.documentElement.setAttribute('data-theme', 'light');
      }
    })();
  </script>
  <title>Recuperar Contrasena - Coltrade</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/forgotPassword.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/theme.css') }}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <div class="background-animation">
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>
    <div class="shape shape-3"></div>
  </div>

  <div class="recover-container">
    <div class="recover-header">
      <div class="logo">
        <i class="fas fa-unlock-keyhole"></i>
        <span>Coltrade</span>
      </div>
      <h1>Recuperar contrasena</h1>
      <p>Primero envia un codigo, luego cambia tu contrasena.</p>
    </div>

    <form id="request-code-form" class="form-block">
      <h2>Paso 1: Enviar codigo</h2>
      <div class="input-group">
        <i class="fas fa-user input-icon"></i>
        <input type="text" id="user" placeholder="Correo o usuario" required />
      </div>
      <button id="send-code-btn" type="submit" class="primary-btn">Enviar codigo al correo</button>
    </form>

    <form id="reset-form" class="form-block hidden">
      <h2>Paso 2: Cambiar contrasena</h2>
      <div class="input-group">
        <i class="fas fa-key input-icon"></i>
        <input type="text" id="code" placeholder="Codigo recibido" required />
      </div>
      <div class="input-group">
        <i class="fas fa-lock input-icon"></i>
        <input type="password" id="new_password" placeholder="Nueva contrasena" required minlength="6" />
      </div>
      <div class="input-group">
        <i class="fas fa-lock input-icon"></i>
        <input type="password" id="confirm_password" placeholder="Confirmar nueva contrasena" required minlength="6" />
      </div>
      <button id="change-password-btn" type="submit" class="primary-btn">Cambiar contrasena</button>
    </form>

    <div class="actions">
      <a href="{{ url_for('inicio.index') }}" class="back-link">Volver al login</a>
    </div>

    <div id="msg" class="msg"></div>
  </div>

  <script src="{{ url_for('static', filename='js/theme.js') }}"></script>
  <script src="{{ url_for('static', filename='js/forgotPassword.js') }}"></script>
</body>
</html>
